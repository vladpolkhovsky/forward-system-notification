server:
  servlet:
    context-path: /api/bot
  port: 8085

spring:
  application:
    name: bot-app

  datasource:
    hikari:
      maximum-pool-size: 5
      max-lifetime: 60000
      validationTimeout: 3000
    driver-class-name: org.postgresql.Driver
    username: localDB
    password: localPS
    url: jdbc:postgresql://host.docker.internal:5432/local

app:
  jwt:
    secret: secret
    expiration: 7200000

  telegram:
    notification:
      token: token
    customer:
      token: token